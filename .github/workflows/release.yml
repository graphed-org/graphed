name: release

# Publish to PyPI on a version tag (vX.Y.Z).
#
# Auth:  a PyPI API token stored as the repo secret PYPI_TOKEN (uploaded as user __token__).
# Verify: every wheel + the sdist gets an OIDC-signed GitHub build-provenance attestation
#         (actions/attest-build-provenance, Sigstore) tying the artifact to this repo+workflow+commit.
#         Anyone can verify a downloaded artifact with:
#             gh attestation verify <file> --repo graphed-org/graphed
#
# Why token auth AND OIDC (not PyPI's own PEP 740 attestations): PyPI's built-in attestations are
# only generated via Trusted Publishing, which is mutually exclusive with API-token auth. So we
# authenticate the upload with the token and attach independent, verifiable provenance via GitHub's
# OIDC identity. To switch to Trusted Publishing instead: configure a publisher at
# https://pypi.org/manage/project/graphed/settings/publishing/ (owner=graphed-org, repo=graphed,
# workflow=release.yml, environment=pypi), then drop `password:` and set the publish `attestations: true`.
#
# NOTE: bump the version (Cargo.toml + pyproject) before tagging — re-uploading a version already on
# PyPI (0.0.1 is published) is rejected.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build wheels + sdist (maturin)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS universal2 targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - shell: bash
        run: |
          python -m pip install --upgrade pip maturin
          if [ "$RUNNER_OS" = "macOS" ]; then
            maturin build --release --out dist --target universal2-apple-darwin -i python
          else
            maturin build --release --out dist -i python
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip maturin
          maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI (token auth + OIDC build provenance)
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # mint the OIDC token for Sigstore-signed build provenance
      attestations: write # persist the provenance attestations to this repo
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # OIDC-signed provenance for every artifact about to be uploaded; verify with:
      #   gh attestation verify <file> --repo graphed-org/graphed
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_TOKEN }}
          # PEP 740 attestations require Trusted Publishing (incompatible with token auth); provenance
          # is supplied by the attest-build-provenance step above instead.
          attestations: false
