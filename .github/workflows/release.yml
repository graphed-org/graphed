name: release

# Publish to PyPI on a version tag (vX.Y.Z), using PyPI Trusted Publishing (OIDC — no API token).
#
# BEFORE this can publish you must, once, configure a Trusted Publisher on PyPI for the `graphed`
# project (https://pypi.org/manage/project/graphed/settings/publishing/):
#   owner=graphed-org  repo=graphed  workflow=release.yml  environment=pypi
# The project name `graphed` is currently free on PyPI. Until the trusted publisher is configured,
# this workflow builds and verifies the artifacts but the publish step will no-op/fail — that is
# intentional (nothing is uploaded without the maintainer opting in).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build wheels + sdist (maturin)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Add macOS universal2 targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - shell: bash
        run: |
          python -m pip install --upgrade pip maturin
          if [ "$RUNNER_OS" = "macOS" ]; then
            maturin build --release --out dist --target universal2-apple-darwin -i python
          else
            maturin build --release --out dist -i python
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip maturin
          maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI (trusted publishing)
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
