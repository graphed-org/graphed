# Read the Docs configuration — builds the consolidated `graphed` documentation.
# Mirrors the "docs (sphinx -W)" job in .github/workflows/ci.yml.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    # graphed is a maturin/PyO3 package; `pip install .` builds a Rust extension, so RTD needs cargo.
    rust: "latest"
  apt_packages:
    # sphinx.ext.inheritance_diagram shells out to `dot`; conf.py enables it only when present.
    - graphviz

python:
  install:
    # Build & install graphed with the docs toolchain plus the two runtime backends conf.py leaves
    # unmocked (numpy, awkward — see autodoc_mock_imports in docs/conf.py for everything mocked).
    - method: pip
      path: .
      extra_requirements:
        - docs
        - awkward
        - numpy

sphinx:
  configuration: docs/conf.py
